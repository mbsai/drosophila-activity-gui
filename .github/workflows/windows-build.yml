name: windows-build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller DrosophilaActivityGUI.spec --noconfirm

      - name: Package portable zip
        run: Compress-Archive -Path dist\DrosophilaActivityGUI\* -DestinationPath DrosophilaActivityGUI-windows-portable.zip

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: DrosophilaActivityGUI-windows-portable
          path: DrosophilaActivityGUI-windows-portable.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DrosophilaActivityGUI-Setup
          path: installer_output/DrosophilaActivityGUI-Setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DrosophilaActivityGUI-windows-portable.zip
            installer_output/DrosophilaActivityGUI-Setup.exe
